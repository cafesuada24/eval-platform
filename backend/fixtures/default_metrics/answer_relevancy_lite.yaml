name: answer_relevancy_lite
type: ai-judge
description: A fast, single-call evaluation of how relevant the output is to the user''s question.
model_configuration:
  provider: openai
  model: gpt-4o
  temperature: 0.0
required_inputs:
  - input_text
  - output_text
prompt_template: 'You are an expert judge checking answer relevance.

  Determine if the output is relevant to the input question.

  Identify irrelevant sentences and calculate a score.


  User Question:

  {{input_text}}


  Generated Response:

  {{output_text}}'
scoring_scale:
  min: 0.0
  max: 1.0
  data_type: float
