name: context_recall_rigorous
type: ai-judge
description: A highly precise, multi-call evaluation that extracts claims from expected output, verifies their presence in retrieved context, and computes the exact recall score mathematically.
evaluation_strategy: context_recall_rigorous
model_configuration:
  provider: openai
  model: gpt-4o
  temperature: 0.0
required_inputs:
  - retrieved_context
  - testcase.expected_outputs.expected_output
scoring_scale:
  min: 0.0
  max: 1.0
  data_type: float
