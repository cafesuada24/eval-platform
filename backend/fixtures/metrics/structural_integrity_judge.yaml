name: "structural_integrity_judge"
type: "ai-judge"
description: "Evaluates if structured data (like tables, lists, or key-value pairs) from the uploaded artifacts survived the parsing process, or if they were flattened into confusing text strings."
model_configuration:
  provider: "google"
  model: "gemini-1.5-pro"
  temperature: 0.0
required_inputs:
  - "input_text"
  - "input_artifacts_ocr"
scoring_scale:
  min: 1
  max: 3
  data_type: "integer"
prompt_template: |
  Analyze the following text extracted from a user's uploaded document. The user is asking a question that likely requires structured data (like a table or list) to answer.
  
  User Query:
  {{ input_text }}
  
  Extracted Document Text:
  {{ input_artifacts_ocr }}
  
  Did the extraction process preserve the structure necessary to answer the query? 
  Score 1: No structure preserved. Data is flattened, columns are mixed together, making it impossible to confidently read rows/values.
  Score 2: Partial structure. Tables or lists are somewhat mangled but can be deduced with heavy reasoning.
  Score 3: Good structure. Data is cleanly formatted (e.g., Markdown tables, clear JSON, or clean line breaks) allowing for accurate data retrieval.
