name: structural_integrity_judge
description: Custom AI judge metric for structural_integrity_judge
type: ai-judge
required_inputs:
- input_text
- input_artifacts_ocr
scoring_scale:
  min: 0.0
  max: 1.0
  data_type: float
model_configuration:
  provider: google
  model: gemini-3.1-flash-lite
  temperature: 0.0
prompt_template: "Analyze the following text extracted from a user's uploaded document.\
  \ The user is asking a question that likely requires structured data (like a table\
  \ or list) to answer.\n\nUser Query:\n{{ input_text }}\n\nExtracted Document Text:\n\
  {{ input_artifacts_ocr }}\n\nDid the extraction process preserve the structure necessary\
  \ to answer the query? \nScore 0: Poor/No structure preserved. Data is flattened,\
  \ columns are mixed together, making it impossible to confidently read rows/values.\n\
  Score 0.5: Partial structure. Tables or lists are somewhat mangled but can be deduced\
  \ with heavy reasoning.\nScore 1: Excellent structure. Data is cleanly formatted\
  \ (e.g., Markdown tables, clear JSON, or clean line breaks) allowing for accurate\
  \ data retrieval."
is_system_default: false
