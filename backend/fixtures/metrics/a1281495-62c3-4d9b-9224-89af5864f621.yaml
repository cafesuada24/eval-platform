name: relevance
description: Custom AI judge metric for relevance
type: ai-judge
required_inputs:
- input_text
- retrieved_context
scoring_scale:
  min: 0.0
  max: 1.0
  data_type: float
model_configuration:
  provider: google
  model: gemini-3.1-flash-lite
  temperature: 0.0
prompt_template: 'Evaluate the relevance of the retrieved context to the user input.
  Input: {{ input_text }}. Context: {{ retrieved_context }}. Provide a score between
  0 and 1.'
is_system_default: false
